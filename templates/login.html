<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Checkbook Login</title>
  <style>
    body { font-family: system-ui; margin: 16px; max-width: 900px; background:#000; color:#8fd3ff; }
    input, button { font-size: 18px; padding: 10px; background:#111; color:#8fd3ff; border:1px solid #8fd3ff; }
    button:hover { background:#8fd3ff; color:#000; cursor:pointer; }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .err { margin-top: 12px; color:#ff7aa2; font-weight:700; }
  </style>
</head>
<body>
  <h2>Checkbook</h2>
  <form method="POST" class="row">
    <input name="username" autocomplete="username" placeholder="Username" required>
    <input name="pin" type="password" inputmode="numeric" autocomplete="current-password"
           placeholder="PIN (4+ digits)" minlength="4" required>
    <button type="submit">Continue</button>
  </form>

  {% if error %}
    <div class="err">{{ error }}</div>
  {% endif %}
</body>
</html>
